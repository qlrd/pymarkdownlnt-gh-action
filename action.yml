name: 'pymarkdownlnt'
description: 'Lint Markdown files with PyMarkdown, optionally emitting GitHub Actions warnings instead of failing.'
author: 'qlrd'

branding:
  icon: 'check-square'
  color: 'blue'

inputs:
  disable-rules:
    description: 'Comma-separated rules to disable (e.g. "MD013,MD025").'
    required: false
    default: ''
  enable-rules:
    description: 'Comma-separated rules to enable (e.g. "MD024").'
    required: false
    default: ''
  paths:
    description: 'Glob or space-separated paths to scan. Expanded by bash on the runner.'
    required: false
    default: './**.md'
  warn-only:
    description: 'When "true", emit a workflow warning annotation on lint failure and exit 0. When "false", fail the step.'
    required: false
    default: 'true'
  version:
    description: 'pymarkdownlnt version (pip spec). Empty installs the latest.'
    required: false
    default: ''
  globstar:
    description: 'When "true", enable bash globstar so "**" matches recursively.'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install pymarkdownlnt
      shell: bash
      run: |
        python3 -m pip install --upgrade pip
        if [ -n "${{ inputs.version }}" ]; then
          python3 -m pip install "pymarkdownlnt==${{ inputs.version }}"
        else
          python3 -m pip install pymarkdownlnt
        fi

    - name: Run pymarkdownlnt
      shell: bash
      env:
        D: ${{ inputs.disable-rules }}
        E: ${{ inputs.enable-rules }}
        P: ${{ inputs.paths }}
        WARN: ${{ inputs.warn-only }}
        GLOB: ${{ inputs.globstar }}
      run: |
        set -u
        [ "$GLOB" = "true" ] && shopt -s globstar
        args=()
        [ -n "$D" ] && args+=(-d "$D")
        [ -n "$E" ] && args+=(-e "$E")
        if ! pymarkdownlnt "${args[@]}" scan $P; then
          if [ "$WARN" = "true" ]; then
            echo "::warning title=Markdown lint::pymarkdownlnt found issues. See log above for details."
            exit 0
          fi
          exit 1
        fi
